<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📡 Haber Takip Merkezi - 12 Kanallı</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        body { background: #0a0e27; color: #e1e8ed; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        
        .top-bar { background: linear-gradient(90deg, #0f1419 0%, #1a2947 100%); border-bottom: 2px solid #1da1f2; padding: 12px 16px; display: flex; align-items: center; gap: 16px; z-index: 100; height: 50px; }
        h1 { font-size: 18px; color: #fff; margin: 0; white-space: nowrap; }
        .info { font-size: 12px; color: #8892b0; flex: 1; }
        .controls { display: flex; gap: 8px; align-items: center; }
        
        .layout-toggle { display: flex; gap: 4px; }
        .layout-btn { padding: 6px 12px; background: #1a2947; border: 1px solid #2d3e5f; color: #8892b0; cursor: pointer; border-radius: 4px; font-size: 11px; transition: all 0.2s; }
        .layout-btn.active { background: #1da1f2; color: #fff; border-color: #1da1f2; }
        
        .search-box { padding: 6px 12px; background: #1a2947; border: 1px solid #2d3e5f; color: #e1e8ed; border-radius: 4px; font-size: 12px; width: 200px; }
        .search-box:focus { outline: none; border-color: #1da1f2; }
        
        .main-container { display: grid; grid-template-columns: minmax(280px, 300px) 1fr; gap: 0; height: calc(100vh - 50px); }
        
        /* Left Sidebar */
        .sidebar { background: #0f1419; border-right: 1px solid #2d3e5f; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 12px; }
        
        .section { display: flex; flex-direction: column; gap: 8px; }
        .section-title { font-size: 12px; font-weight: 700; color: #fff; text-transform: uppercase; letter-spacing: 0.5px; padding: 6px 0; border-bottom: 1px solid #2d3e5f; }
        
        input, textarea { padding: 8px 12px; background: #1a2947; border: 1px solid #2d3e5f; color: #e1e8ed; border-radius: 4px; font-size: 12px; width: 100%; font-family: inherit; }
        input:focus, textarea:focus { outline: none; border-color: #1da1f2; }
        
        button { padding: 8px 12px; border: none; color: #fff; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 600; transition: all 0.2s; }
        .btn-primary { background: #1da1f2; width: 100%; }
        .btn-primary:hover { background: #1a91da; }
        .btn-success { background: #17bf63; width: 100%; }
        .btn-success:hover { background: #0f9b50; }
        .btn-small { padding: 4px 8px; width: auto; font-size: 11px; background: transparent; border: 1px solid #2d3e5f; color: #8892b0; }
        .btn-small:hover { border-color: #1da1f2; color: #1da1f2; }
        .btn-delete { background: transparent; border: none; color: #e74c3c; padding: 4px; }
        
        .list { display: flex; flex-direction: column; gap: 6px; max-height: 250px; overflow-y: auto; }
        .item { padding: 8px; background: #1a2947; border: 1px solid #2d3e5f; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; gap: 8px; font-size: 11px; }
        .keyword-item { border-color: #17bf63; }
        
        .item-info { flex: 1; min-width: 0; }
        .item-name { color: #1da1f2; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: monospace; font-size: 10px; }
        .item-status { color: #8892b0; font-size: 10px; margin-top: 2px; }
        .status-active { color: #17bf63; }
        
        /* Right Content */
        .content { display: flex; flex-direction: column; gap: 0; overflow: hidden; }
        
        .grid-container { flex: 1; overflow-y: auto; padding: 12px; }
        .grid { display: grid; gap: 8px; }
        .grid.grid-2 { grid-template-columns: repeat(2, 1fr); }
        .grid.grid-3 { grid-template-columns: repeat(3, 1fr); }
        .grid.grid-4 { grid-template-columns: repeat(4, 1fr); }
        .grid.grid-6 { grid-template-columns: repeat(6, 1fr); }
        
        .video-card { background: #1a2947; border: 1px solid #2d3e5f; border-radius: 6px; overflow: hidden; display: flex; flex-direction: column; transition: all 0.2s; }
        .video-card:hover { border-color: #1da1f2; box-shadow: 0 0 10px rgba(29, 161, 242, 0.3); }
        
        .video-wrapper { position: relative; padding-top: 56.25%; background: #000; }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        
        .video-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; flex-direction: column; justify-content: space-between; padding: 8px; opacity: 0; transition: opacity 0.2s; }
        .video-card:hover .video-overlay { opacity: 1; }
        
        .video-top { display: flex; justify-content: space-between; }
        .video-badge { padding: 4px 8px; background: rgba(23, 191, 99, 0.95); color: #fff; border-radius: 3px; font-size: 10px; font-weight: 700; }
        .video-badge.off { background: rgba(102, 102, 102, 0.95); }
        
        .rec-badge { padding: 4px 8px; background: #e74c3c; color: #fff; border-radius: 3px; font-size: 10px; font-weight: 700; }
        
        .video-controls { display: flex; gap: 6px; }
        .control-btn { padding: 6px 10px; background: rgba(29, 161, 242, 0.9); border: none; color: #fff; border-radius: 2px; cursor: pointer; font-size: 11px; font-weight: 600; }
        .control-btn:hover { background: rgba(29, 161, 242, 1); }
        
        .video-info { padding: 8px; border-top: 1px solid #2d3e5f; }
        .video-id { font-size: 10px; color: #1da1f2; font-weight: 600; font-family: monospace; }
        .video-title { font-size: 9px; color: #8892b0; margin-top: 2px; line-height: 1.2; }
        
        /* Bottom Alerts */
        .alerts-section { background: #1a2947; border-top: 1px solid #2d3e5f; display: flex; flex-direction: column; max-height: 180px; }
        .alerts-header { padding: 10px 12px; border-bottom: 1px solid #2d3e5f; font-size: 12px; font-weight: 700; color: #fff; }
        .alerts-body { flex: 1; overflow-y: auto; padding: 8px; }
        
        .alert-item { padding: 6px; background: #0f1419; border-left: 3px solid #e74c3c; margin-bottom: 4px; border-radius: 2px; font-size: 9px; }
        .alert-keyword { color: #e74c3c; font-weight: 700; margin-bottom: 2px; }
        .alert-text { color: #e1e8ed; margin-bottom: 2px; }
        .alert-info { color: #8892b0; font-size: 8px; }
        
        .empty { padding: 12px; color: #657786; font-size: 11px; text-align: center; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0a0e27; }
        ::-webkit-scrollbar-thumb { background: #2d3e5f; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #3d4e6f; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
        .modal.show { display: flex; }
        .modal-content { background: #1a2947; border: 1px solid #2d3e5f; border-radius: 8px; padding: 20px; max-width: 500px; width: 90%; }
        .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 12px; color: #fff; }
        .modal-body { color: #8892b0; margin-bottom: 12px; line-height: 1.4; }
        .modal-buttons { display: flex; gap: 8px; }
        .modal-buttons button { flex: 1; }
        
        .stats { display: flex; gap: 8px; font-size: 12px; color: #8892b0; }
        .stat-item { background: #1a2947; padding: 6px 12px; border-radius: 4px; }
        .stat-value { color: #1da1f2; font-weight: 700; }
    </style>
</head>
<body>
    <!-- Top Bar -->
    <div class="top-bar">
        <h1>📡 Haber Takip Merkezi</h1>
        <div class="info">
            <span id="channelCount">0</span>/12 Kanal Aktif • 
            <span id="keywordCount">0</span> Kelime • 
            <span id="alertCount">0</span> Uyarı
        </div>
        <input type="text" id="globalSearch" class="search-box" placeholder="Kanal veya kelime ara...">
        <div class="layout-toggle">
            <button class="layout-btn active" onclick="setLayout(6)">6x2</button>
            <button class="layout-btn" onclick="setLayout(4)">4x3</button>
            <button class="layout-btn" onclick="setLayout(3)">3x4</button>
            <button class="layout-btn" onclick="setLayout(2)">2x6</button>
        </div>
    </div>

    <div class="main-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <!-- Add Channel -->
            <div class="section">
                <div class="section-title">📺 Kanal Ekle</div>
                <input type="text" id="channelInput" placeholder="YouTube URL...">
                <button class="btn-primary" onclick="addChannel()">Ekle</button>
            </div>

            <!-- Channels -->
            <div class="section" style="flex: 1; min-height: 0;">
                <div class="section-title">Aktif Kanallar</div>
                <div id="channelsList" class="list"></div>
            </div>

            <!-- Add Keyword -->
            <div class="section">
                <div class="section-title">🔍 Kelime Takibi</div>
                <input type="text" id="keywordInput" placeholder="Kelime...">
                <button class="btn-success" onclick="addKeyword()">Ekle</button>
            </div>

            <!-- Keywords -->
            <div class="section" style="flex: 1; min-height: 0;">
                <div id="keywordsList" class="list"></div>
            </div>

            <!-- Stats -->
            <div class="section">
                <div class="stats">
                    <div class="stat-item">Kayıtlar: <span class="stat-value" id="recordCount">0</span></div>
                    <div class="stat-item">Uptime: <span class="stat-value" id="uptime">0h</span></div>
                </div>
            </div>
        </div>

        <!-- Content -->
        <div class="content">
            <!-- Grid -->
            <div class="grid-container">
                <div id="grid" class="grid grid-6"></div>
            </div>

            <!-- Alerts -->
            <div class="alerts-section">
                <div class="alerts-header">🔔 Canlı Uyarılar (<span id="alertCountBadge">0</span>)</div>
                <div id="alertsList" class="alerts-body"></div>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle"></div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-buttons">
                <button class="btn-primary" onclick="confirmModal()">Onayla</button>
                <button class="btn-small" style="flex: 1;" onclick="closeModal()">İptal</button>
            </div>
        </div>
    </div>

    <script>
        let channels = [];
        let keywords = [];
        let alerts = [];
        let currentLayout = 6;
        let startTime = Date.now();
        let pendingAction = null;
        let recordingCount = 0;

        function extractVideoId(url) {
            const match = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\n?#]+)/);
            return match ? match[1] : null;
        }

        function getVideoTitle(videoId) {
            const titles = {
                'dQw4w9WgXcQ': 'Rick Roll',
                'jNQXAC9IVRw': 'Me at the zoo',
            };
            return titles[videoId] || 'Video ' + videoId.substring(0, 8);
        }

        function setLayout(cols) {
            currentLayout = cols;
            document.querySelectorAll('.layout-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            const grid = document.getElementById('grid');
            grid.className = 'grid grid-' + cols;
        }

        function showModal(title, body, action) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalBody').textContent = body;
            pendingAction = action;
            document.getElementById('modal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('show');
            pendingAction = null;
        }

        function confirmModal() {
            if (pendingAction) pendingAction();
            closeModal();
        }

        function addChannel() {
            const url = document.getElementById('channelInput').value.trim();
            if (!url) return;
            const id = extractVideoId(url);
            if (!id) { alert('Geçerli YouTube URL'); return; }
            if (channels.length >= 12) { alert('Max 12 kanal'); return; }
            
            channels.push({ 
                id: Date.now(), 
                videoId: id, 
                title: getVideoTitle(id),
                active: true,
                recording: false,
                recordingUrl: null
            });
            document.getElementById('channelInput').value = '';
            render();
        }

        function addKeyword() {
            const word = document.getElementById('keywordInput').value.trim().toLowerCase();
            if (!word) return;
            if (keywords.some(k => k.word === word)) { alert('Zaten var'); return; }
            keywords.push({ id: Date.now(), word: word });
            document.getElementById('keywordInput').value = '';
            render();
        }

        function deleteChannel(id) {
            showModal('Kanal Sil?', 'Bu kanalı silmek istediğinizden emin misiniz?', () => {
                channels = channels.filter(c => c.id !== id);
                render();
            });
        }

        function deleteKeyword(id) {
            keywords = keywords.filter(k => k.id !== id);
            render();
        }

        function toggleChannel(id) {
            const c = channels.find(ch => ch.id === id);
            if (c) c.active = !c.active;
            render();
        }

        function toggleRecording(id) {
            const c = channels.find(ch => ch.id === id);
            if (!c) return;
            if (!c.recording) {
                c.recording = true;
                recordingCount++;
                render();
            } else {
                c.recording = false;
                c.recordingUrl = 'recorded-' + Date.now();
                recordingCount--;
                render();
            }
        }

        function downloadRecording(id) {
            const c = channels.find(ch => ch.id === id);
            if (c && c.recordingUrl) {
                alert('Video indirilecek: ' + c.recordingUrl);
            }
        }

        function screenshot(id) {
            alert('📸 Ekran görüntüsü alındı: ' + id);
        }

        function render() {
            const activeChannels = channels.filter(c => c.active).length;
            document.getElementById('channelCount').textContent = activeChannels;
            document.getElementById('keywordCount').textContent = keywords.length;
            document.getElementById('alertCountBadge').textContent = alerts.length;
            document.getElementById('alertCount').textContent = alerts.length;
            document.getElementById('recordCount').textContent = recordingCount;
            
            const hours = Math.floor((Date.now() - startTime) / 3600000);
            document.getElementById('uptime').textContent = hours + 'h';

            // Channels List
            const channelsList = document.getElementById('channelsList');
            channelsList.innerHTML = channels.map(ch => `
                <div class="item">
                    <div class="item-info">
                        <div class="item-name">${ch.title}</div>
                        <div class="item-status ${ch.active ? 'status-active' : ''}">
                            ${ch.active ? '🟢 Aktif' : '⚪ Pasif'}
                        </div>
                    </div>
                    <div style="display: flex; gap: 4px;">
                        <button class="btn-small" onclick="toggleChannel(${ch.id})">
                            ${ch.active ? '⏸' : '▶'}
                        </button>
                        <button class="btn-delete" onclick="deleteChannel(${ch.id})">🗑️</button>
                    </div>
                </div>
            `).join('') || '<div class="empty">Kanal yok</div>';

            // Keywords
            const keywordsList = document.getElementById('keywordsList');
            keywordsList.innerHTML = keywords.map(kw => `
                <div class="item keyword-item">
                    <span style="color: #17bf63; font-weight: 700;">#${kw.word}</span>
                    <button class="btn-delete" onclick="deleteKeyword(${kw.id})">✕</button>
                </div>
            `).join('') || '<div class="empty">Kelime yok</div>';

            // Videos Grid
            const grid = document.getElementById('grid');
            grid.innerHTML = channels.filter(c => c.active).slice(0, 12).map(ch => `
                <div class="video-card">
                    <div class="video-wrapper">
                        <iframe src="https://www.youtube-nocookie.com/embed/${ch.videoId}?autoplay=1&mute=1&controls=0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                        
                        <div class="video-overlay">
                            <div class="video-top">
                                <div class="video-badge">🟢 ON</div>
                                ${ch.recording ? '<div class="rec-badge">● REC</div>' : ''}
                            </div>
                            <div class="video-controls">
                                <button class="control-btn" onclick="screenshot(${ch.id})">📸</button>
                                <button class="control-btn" onclick="toggleRecording(${ch.id})">
                                    ${ch.recording ? '⏹' : '⏺'}
                                </button>
                                ${ch.recordingUrl ? `<button class="control-btn" onclick="downloadRecording(${ch.id})">⬇️</button>` : ''}
                            </div>
                        </div>
                    </div>
                    
                    <div class="video-info">
                        <div class="video-id">${ch.videoId}</div>
                        <div class="video-title">${ch.title}</div>
                    </div>
                </div>
            `).join('') || '<div class="empty">Aktif kanal yok</div>';

            // Alerts
            const alertsList = document.getElementById('alertsList');
            alertsList.innerHTML = alerts.slice(0, 15).map(a => `
                <div class="alert-item">
                    <div class="alert-keyword">#${a.keyword}</div>
                    <div class="alert-text">${a.text}</div>
                    <div class="alert-info">${a.channel} • ${a.time}</div>
                </div>
            `).join('') || '<div class="empty">Uyarı yok</div>';
        }

        // Event Listeners
        document.getElementById('channelInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') addChannel(); });
        document.getElementById('keywordInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') addKeyword(); });

        document.getElementById('globalSearch').addEventListener('input', (e) => {
            const search = e.target.value.toLowerCase();
            // Filter logic burada eklenebilir
        });

        // Test Alert
        setTimeout(() => {
            alerts.unshift({
                keyword: 'haber',
                text: 'Test uyarısı - sistem aktif ve çalışıyor',
                channel: 'Video Channel',
                time: new Date().toLocaleTimeString()
            });
            render();
        }, 2000);

        render();
    </script>
</body>
</html>
