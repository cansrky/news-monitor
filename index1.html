<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📡 Haber Takip Merkezi</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0e27; color: #e1e8ed; font-family: system-ui; min-height: 100vh; }
        header { background: #0a0e27; border-bottom: 2px solid #1e2d4d; padding: 20px 24px; }
        h1 { font-size: 28px; margin-bottom: 8px; color: #fff; }
        .container { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; padding: 20px; }
        .section { margin-bottom: 24px; }
        h2 { font-size: 14px; font-weight: 700; margin-bottom: 10px; color: #fff; }
        input { padding: 10px; background: #1a2947; border: 1px solid #2d3e5f; color: #e1e8ed; border-radius: 6px; width: 100%; margin-bottom: 8px; }
        button { padding: 10px 16px; background: #1da1f2; border: none; color: #fff; border-radius: 6px; cursor: pointer; font-weight: 700; width: 100%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 10px; }
        .card { background: #1a2947; border-radius: 8px; border: 1px solid #2d3e5f; overflow: hidden; }
        .video { position: relative; padding-top: 56.25%; background: #000; }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .badge { position: absolute; top: 6px; right: 6px; padding: 4px 8px; background: rgba(23, 191, 99, 0.95); color: #fff; border-radius: 4px; font-size: 9px; font-weight: 700; }
        .list { display: flex; flex-direction: column; gap: 8px; }
        .item { padding: 10px; background: #1a2947; border: 1px solid #2d3e5f; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; }
        .alerts { background: #1a2947; border: 1px solid #2d3e5f; border-radius: 8px; padding: 12px; max-height: 200px; overflow-y: auto; }
        .alert { padding: 8px; background: #0f1419; border-left: 3px solid #e74c3c; margin-bottom: 6px; border-radius: 2px; font-size: 10px; }
    </style>
</head>
<body>
    <header>
        <h1>📡 Haber Takip Merkezi - 12 Kanallı</h1>
        <p>YouTube & Live Stream İzleme</p>
    </header>

    <div class="container">
        <div>
            <div class="section">
                <h2>📺 Kanal Ekle</h2>
                <input type="text" id="channelInput" placeholder="https://youtube.com/watch?v=...">
                <button onclick="addChannel()">Ekle</button>
            </div>
            <div class="section">
                <h2>Kanallar (<span id="count">0</span>/12)</h2>
                <div id="channels" class="list"></div>
            </div>
            <div class="section">
                <h2>🔍 Kelimeler</h2>
                <input type="text" id="keywordInput" placeholder="Kelime...">
                <button onclick="addKeyword()" style="background: #17bf63;">Ekle</button>
                <div id="keywords" class="list" style="margin-top: 8px;"></div>
            </div>
        </div>

        <div>
            <div class="grid" id="grid"></div>
            <div class="alerts" id="alerts">
                <h3 style="color: #fff; margin-bottom: 8px;">🔔 UYARILAR</h3>
                <div id="alertsList"></div>
            </div>
        </div>
    </div>

    <script>
        let channels = [];
        let keywords = [];
        let alerts = [];

        function extractVideoId(url) {
            const match = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\n?#]+)/);
            return match ? match[1] : null;
        }

        function addChannel() {
            const url = document.getElementById('channelInput').value.trim();
            if (!url) return;
            const id = extractVideoId(url);
            if (!id) { alert('Geçerli URL'); return; }
            if (channels.length >= 12) { alert('Max 12'); return; }
            channels.push({ id: Date.now(), videoId: id, active: true });
            document.getElementById('channelInput').value = '';
            render();
        }

        function addKeyword() {
            const word = document.getElementById('keywordInput').value.trim().toLowerCase();
            if (!word) return;
            keywords.push({ id: Date.now(), word: word });
            document.getElementById('keywordInput').value = '';
            render();
        }

        function deleteChannel(id) {
            channels = channels.filter(c => c.id !== id);
            render();
        }

        function deleteKeyword(id) {
            keywords = keywords.filter(k => k.id !== id);
            render();
        }

        function toggleChannel(id) {
            const c = channels.find(ch => ch.id === id);
            if (c) c.active = !c.active;
            render();
        }

        function render() {
            document.getElementById('count').textContent = channels.length;
            
            document.getElementById('channels').innerHTML = channels.map(ch => `
                <div class="item">
                    <div>
                        <div style="font-size: 11px; color: #8892b0;">${ch.videoId}</div>
                        <div style="font-size: 10px; color: ${ch.active ? '#17bf63' : '#657786'};">${ch.active ? '🟢 Aktif' : '⚪ Pasif'}</div>
                    </div>
                    <div style="display: flex; gap: 4px;">
                        <button onclick="toggleChannel(${ch.id})" style="padding: 5px 8px; background: transparent; border: 1px solid #2d3e5f; color: #8892b0; width: auto; font-size: 9px;">${ch.active ? 'Durdur' : 'Başla'}</button>
                        <button onclick="deleteChannel(${ch.id})" style="padding: 5px 8px; background: transparent; border: none; color: #e74c3c; width: auto;">🗑️</button>
                    </div>
                </div>
            `).join('') || '<div style="padding: 12px; color: #657786; font-size: 11px; text-align: center;">Kanal eklenmedi</div>';

            document.getElementById('keywords').innerHTML = keywords.map(kw => `
                <div class="item" style="border-color: #17bf63;">
                    <span style="color: #17bf63; font-weight: 700;">#${kw.word}</span>
                    <button onclick="deleteKeyword(${kw.id})" style="background: transparent; border: none; color: #e74c3c; width: auto; padding: 4px;">✕</button>
                </div>
            `).join('') || '<div style="padding: 8px; color: #657786; font-size: 11px; text-align: center;">Kelime yok</div>';

            document.getElementById('grid').innerHTML = channels.slice(0, 12).map(ch => `
                <div class="card">
                    <div class="video">
                        <iframe src="https://www.youtube-nocookie.com/embed/${ch.videoId}?autoplay=1&mute=1&controls=1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                        <div class="badge">${ch.active ? '🟢 ON' : '⚪ OFF'}</div>
                    </div>
                    <div style="padding: 8px; border-top: 1px solid #2d3e5f; font-size: 9px; color: #1da1f2;">${ch.videoId}</div>
                </div>
            `).join('') || '<div style="color: #657786;">🎬 Kanal ekleyin</div>';

            document.getElementById('alertsList').innerHTML = alerts.length > 0 ? alerts.map(a => `
                <div class="alert">
                    <div style="color: #e74c3c; font-weight: 700;">#${a.keyword}</div>
                    <div style="color: #e1e8ed;">${a.text}</div>
                </div>
            `).join('') : '<div style="color: #657786; font-size: 11px;">Henüz uyarı yok</div>';
        }

        document.getElementById('channelInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') addChannel(); });
        document.getElementById('keywordInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') addKeyword(); });

        render();
    </script>
</body>
</html>
